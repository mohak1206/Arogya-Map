<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Patients</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .admin-badge { background-color: var(--teal); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 12px; margin-left: 8px; vertical-align: middle; text-transform: uppercase; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; text-align: left; font-size: 0.9rem; }
        .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .admin-table th { color: var(--text-muted); font-weight: 500; }
        .top-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-box { display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); width: 300px; }
        .search-box input { background: transparent; border: none; color: white; outline: none; margin-left: 8px; width: 100%; font-family: inherit; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: capitalize; }
        .badge.critical { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge.high { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .badge.medium { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .badge.low { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .badge.assigned { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .badge.pending { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .badge.completed { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .badge.cancelled { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
    </style>
</head>
<body class="has-sidebar">
    <div class="bg-mesh"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/admin/dashboard" class="sidebar-logo">
                <i class="fa fa-shield-halved"></i>
                <span>Arogya Map <span class="admin-badge">Admin</span></span>
            </a>
            <button class="sidebar-close" onclick="toggleSidebar()"><i class="fa fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-nav-label">Command Center</div>
            <a href="/admin/dashboard"><i class="fa fa-chart-pie"></i> Dashboard</a>
            <a href="/admin/hospitals"><i class="fa fa-hospital"></i> Hospitals</a>
            <a href="/admin/patients" class="active"><i class="fa fa-truck-medical"></i> Patients</a>
            <a href="/admin/users"><i class="fa fa-users"></i> Users</a>
            <a href="/admin/reports"><i class="fa fa-file-invoice"></i> Reports</a>
            <div class="sidebar-nav-label" style="margin-top: 12px;">Portal</div>
            <a href="/dashboard"><i class="fa fa-arrow-left"></i> User Dashboard</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="user-avatar">A</div>
                <div class="sidebar-user-info">
                    <div class="user-name-sidebar" id="user-name">Admin</div>
                    <div class="user-email-sidebar" id="user-email">admin@system.com</div>
                </div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="handleLogout()" id="logout-btn" style="color: var(--rose);"><i class="fa fa-right-from-bracket"></i> Logout</button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <nav class="navbar" id="navbar">
        <div class="container nav-container" style="height: 56px;">
            <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
            <a href="/admin/dashboard" class="nav-logo"><i class="fa fa-shield-halved"></i><span>Admin Panel</span></a>
            <div style="width: 40px;"></div>
        </div>
    </nav>

    <main class="container" style="margin-top: 80px; margin-bottom: 40px;">
        <h2 class="section-title reveal">Emergency Queue Management</h2>
        
        <div class="top-controls reveal">
            <div class="search-box">
                <i class="fa fa-search teal"></i>
                <input type="text" id="patient-search" placeholder="Search patients..." onkeyup="filterPatients()">
            </div>
            <div style="display: flex; gap: 8px;">
                <select id="filter-priority" class="btn btn-outline" onchange="filterPatients()" style="padding: 6px;">
                    <option value="all">All Priorities</option>
                    <option value="critical">Critical</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
                <select id="filter-status" class="btn btn-outline" onchange="filterPatients()" style="padding: 6px;">
                    <option value="all">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="assigned">Assigned</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
        </div>

        <div class="glass-card reveal" style="overflow-x: auto;">
            <table class="admin-table" id="patients-table">
                <thead>
                    <tr>
                        <th>Priority</th>
                        <th>Patient Name</th>
                        <th>Description</th>
                        <th>Requested At</th>
                        <th>Assigned Hospital</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patients-body">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Assign Hospital Modal -->
    <div id="assignModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2><i class="fa fa-hospital" style="color: var(--teal);"></i> Assign Hospital</h2>
                <button class="btn btn-ghost" onclick="toggleModal('assignModal', false)"><i class="fa fa-times"></i></button>
            </div>
            <form id="assign-hospital-form" onsubmit="submitAssignHospital(event)">
                <input type="hidden" id="a_patient_id">
                <div class="form-group">
                    <label>Select Hospital</label>
                    <select id="a_hospital_id" required>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;"><i class="fa fa-check"></i> Assign</button>
            </form>
        </div>
    </div>

    <!-- Update Status Modal -->
    <div id="statusModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2><i class="fa fa-rotate" style="color: var(--blue);"></i> Update Status</h2>
                <button class="btn btn-ghost" onclick="toggleModal('statusModal', false)"><i class="fa fa-times"></i></button>
            </div>
            <form id="update-status-form" onsubmit="submitUpdateStatus(event)">
                <input type="hidden" id="s_patient_id">
                <div class="form-group">
                    <label>New Status</label>
                    <select id="s_status" required>
                        <option value="pending">Pending</option>
                        <option value="assigned">Assigned</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Update Status</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchAdminPatients();
        });
    </script>
</body>
</html>
